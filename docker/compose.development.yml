name: next-shadcn

services:
  web:
    build:
      context: ..
      dockerfile: app/Dockerfile
      target: development
    command: yarn start:dev
    restart: unless-stopped
    ports:
      - 8000:8000
    env_file:
      - ../app/.env.development
    volumes:
      - ../app:/app
      - ../app/.env.development:/app/.env
